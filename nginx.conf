server {
    listen 80;
    listen [::]:80;
    server_name friedum.com www.friedum.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name friedum.com www.friedum.com;

    root /var/www/friedum_a2p;
    index index.html;

    # SSL — fill in your cert paths (certbot example)
    ssl_certificate     /etc/letsencrypt/live/friedum.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/friedum.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets
    location ~* \.(css|js|png|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-style fallback (serves index.html for any unknown path)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
